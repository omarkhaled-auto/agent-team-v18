# Agent Team Configuration
# See: https://github.com/omar-agent-team/docs

orchestrator:
  model: opus
  max_turns: 500

depth:
  default: standard
  auto_detect: true

convergence:
  max_cycles: 10

interview:
  enabled: true
  min_exchanges: 3

display:
  show_cost: true
  verbose: false

