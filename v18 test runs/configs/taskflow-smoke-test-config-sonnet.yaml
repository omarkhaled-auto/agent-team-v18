# taskflow-smoke-test-config-sonnet.yaml
# V18.1 Hardened Builder — Full Pipeline Smoke Test with Sonnet pinned for Claude paths

max_milestones: 10

orchestrator:
  model: "claude-sonnet-4-6"
  max_budget_usd: 25.0

# Coordinated audit/browser flows still read raw config dict keys.
audit_model: "claude-sonnet-4-6"
audit_model_batch: "claude-sonnet-4-6"

v18:
  planner_mode: "vertical_slice"
  execution_mode: "wave"

  provider_routing: true
  provider_map_b: "codex"
  provider_map_d: "codex"

  codex_timeout_seconds: 5400
  codex_reasoning_effort: "high"

  openapi_generation: true
  scaffold_enabled: true

  wave_t_enabled: true
  wave_t_max_fix_iterations: 2

  live_endpoint_check: true
  evidence_mode: "record_only"

  ui_design_tokens_enabled: true

design_reference:
  enabled: false

audit_team:
  enabled: true
  score_healthy_threshold: 85
  max_reaudit_cycles: 2

mcp:
  playwright_enabled: true
  context7_enabled: true
